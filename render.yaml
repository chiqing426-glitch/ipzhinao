services:
  - type: web
    name: ipzhinao
    runtime: python
    plan: starter
    buildCommand: ""
    startCommand: "HOST=0.0.0.0 python server.py"
    envVars:
      - key: FREE_AI_LIMIT
        value: "3"
      - key: DEEPSEEK_MODEL
        value: "deepseek-v4-flash"
      - key: DB_PATH
        value: "/var/data/app.db"
    disk:
      name: ipzhinao-data
      mountPath: /var/data
      sizeGB: 1
